<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="QR Code Attendance Management System — Standard Edition" />
  <title>QR Attendance</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/tokens.css" />
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
  <!-- ============================ LOGIN ============================ -->
  <section id="login-screen" class="auth" hidden>
    <div class="auth__card">
      <div class="auth__brand">
        <span class="brand__mark" data-icon="qr-code"></span>
        <span class="brand__name" data-org-name>QR Attendance</span>
      </div>
      <h1 class="auth__title">Sign in</h1>
      <p class="auth__subtitle">Administrator access</p>

      <form id="login-form" novalidate>
        <div class="field">
          <label class="field__label" for="login-username">Username</label>
          <input class="input" id="login-username" name="username" autocomplete="username" required />
          <p class="field__error" data-error-for="username"></p>
        </div>

        <div class="field">
          <label class="field__label" for="login-password">Password</label>
          <input class="input" id="login-password" name="password" type="password" autocomplete="current-password" required />
          <p class="field__error" data-error-for="password"></p>
        </div>

        <label class="checkbox">
          <input type="checkbox" id="login-remember" name="remember" />
          <span>Remember me on this device</span>
        </label>

        <button class="btn btn--cta btn--block" type="submit" id="login-submit">
          <span class="btn__label">Sign in</span>
          <span class="spinner" hidden></span>
        </button>
      </form>

      <p class="auth__hint" data-demo-hint hidden>
        Demo mode — any username and password will sign you in.
      </p>
    </div>
  </section>

  <!-- ============================ APP SHELL ============================ -->
  <div id="app-shell" hidden>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">
        <span class="brand__mark" data-icon="qr-code"></span>
        <span class="brand__name" data-org-name>QR Attendance</span>
      </div>
      <nav class="nav" aria-label="Primary">
        <a class="nav__link" href="#/dashboard"  data-route="dashboard"><span data-icon="layout-dashboard"></span> Dashboard</a>
        <a class="nav__link" href="#/scanner"    data-route="scanner"><span data-icon="scan-line"></span> Scan</a>
        <a class="nav__link" href="#/members"    data-route="members"><span data-icon="users"></span> Members</a>
        <a class="nav__link" href="#/attendance" data-route="attendance"><span data-icon="clipboard-list"></span> Attendance</a>
        <a class="nav__link" href="#/analytics"  data-route="analytics"><span data-icon="bar-chart-3"></span> Analytics</a>
        <a class="nav__link" href="#/reports"    data-route="reports"><span data-icon="file-text"></span> Reports</a>
        <a class="nav__link" href="#/settings"   data-route="settings"><span data-icon="settings"></span> Settings</a>
      </nav>
      <div class="sidebar__foot">
        <span class="badge badge--soft" data-env-badge>Demo</span>
      </div>
    </aside>

    <div class="sidebar__scrim" id="sidebar-scrim" hidden></div>

    <!-- Main column -->
    <div class="main">
      <header class="topbar">
        <button class="iconbtn topbar__menu" id="menu-toggle" aria-label="Toggle navigation">
          <span data-icon="menu"></span>
        </button>
        <div class="breadcrumbs" id="breadcrumbs" aria-label="Breadcrumb"></div>
        <div class="topbar__spacer"></div>
        <button class="iconbtn" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
          <span data-icon="moon"></span>
        </button>
        <div class="usermenu">
          <button class="usermenu__btn" id="user-btn" aria-haspopup="true" aria-expanded="false">
            <span class="avatar" data-user-initials>A</span>
            <span class="usermenu__name" data-user-name>Admin</span>
            <span data-icon="chevron-down"></span>
          </button>
          <div class="menu" id="user-popover" role="menu" hidden>
            <button class="menu__item" id="change-password" role="menuitem"><span data-icon="key-round"></span> Change password</button>
            <button class="menu__item" id="logout" role="menuitem"><span data-icon="log-out"></span> Sign out</button>
          </div>
        </div>
      </header>

      <main class="view" id="view" tabindex="-1">
        <!-- Pages render here -->
      </main>
    </div>
  </div>

  <!-- ============================ CDN LIBS ============================ -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- ============================ APP (load order matters) ============================ -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/mock.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/pages/login.js"></script>
  <script src="assets/js/pages/dashboard.js"></script>
  <script src="assets/js/pages/members.js"></script>
  <script src="assets/js/pages/scanner.js"></script>
  <script src="assets/js/pages/attendance.js"></script>
  <script src="assets/js/pages/analytics.js"></script>
  <script src="assets/js/pages/reports.js"></script>
  <script src="assets/js/pages/settings.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
